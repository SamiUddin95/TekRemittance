name: TekRemittance Backend CI/CD
on:
  push:
    branches:
      - deploy
jobs:
  build-and-deploy:
    runs-on: windows
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore NuGet packages
        run: dotnet restore TekRemittance.Web/TekRemittance.Web.csproj

      - name: Build application
        run: dotnet build TekRemittance.Web/TekRemittance.Web.csproj --configuration Release --no-restore

      - name: Publish application
        run: |
          dotnet publish TekRemittance.Web/TekRemittance.Web.csproj `
            --configuration Release `
            --output D:\Publish\TekRemit-be-cicd `
            --no-build

      - name: Stop IIS site & Wait for Locks to Clear
        run: |
          $ErrorActionPreference = "Stop"
          Import-Module WebAdministration
          Write-Host "Stopping IIS Site..."
          Stop-Website -Name "TekRemit-be-cicd" -ErrorAction SilentlyContinue
          Stop-WebAppPool -Name "TekRemit-be-cicd_Pool" -ErrorAction SilentlyContinue
          Write-Host "Waiting 8 seconds for worker process to release files..."
          Start-Sleep -Seconds 8

      - name: Clear old deployment files
        run: |
          $ErrorActionPreference = "Stop"
          Get-ChildItem -Path "D:\WebApps\TekRemit-be-cicd" `
            -Exclude "web.config", "appsettings.Production.json" `
            | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

      - name: Copy new build to IIS
        run: |
          $ErrorActionPreference = "Stop"
          $publishPath = "D:\Publish\TekRemit-be-cicd"
          if (Test-Path $publishPath) {
            Copy-Item -Path "$publishPath\*" -Destination "D:\WebApps\TekRemit-be-cicd\" -Recurse -Force
            Write-Host "Build files copied from $publishPath"
          } else {
            Write-Error "Publish output not found at $publishPath"
            exit 1
          }

      - name: Start IIS site
        run: |
          $ErrorActionPreference = "Stop"
          Import-Module WebAdministration
          Start-WebAppPool -Name "TekRemit-be-cicd_Pool"
          Start-Sleep -Seconds 3
          Start-Website -Name "TekRemit-be-cicd"
          Start-Sleep -Seconds 5
          $state = (Get-Website -Name "TekRemit-be-cicd").State
          if ($state -ne "Started") {
            Write-Error "IIS site failed to start. State: $state"
            exit 1
          }
          Write-Host "IIS site started successfully. State: $state"

  notify-success:
    runs-on: windows
    needs: build-and-deploy
    if: success()
    steps:
      - name: Send success email
        uses: https://github.com/dawidd6/action-send-mail@v3
        with:
          server_address: mail.teknoloje.com
          server_port: 587
          secure: false
          ignore_cert: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: teknoloje@teknoloje.com,syed.sami@teknoloje.com
          from: "Gitea CI/CD <teknoloje@teknoloje.com>"
          subject: "Deployed: TekRemittance Backend"
          body: |
            TekRemittance Backend deployed successfully to http://10.0.0.1:8097.
            Commit: ${{ github.event.head_commit.message }}

  notify-failure:
    runs-on: windows
    needs: build-and-deploy
    if: failure()
    steps:
      - name: Send failure email
        uses: https://github.com/dawidd6/action-send-mail@v3
        with:
          server_address: mail.teknoloje.com
          server_port: 587
          secure: false
          ignore_cert: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: teknoloje@teknoloje.com,syed.sami@teknoloje.com
          from: "Gitea CI/CD <teknoloje@teknoloje.com>"
          subject: "FAILED: TekRemittance Backend"
          body: |
            TekRemittance Backend pipeline failed on the deploy branch.
            Commit: ${{ github.event.head_commit.message }}
